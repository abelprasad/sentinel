spring:
  application:
    name: sentinel
  datasource:
    url: jdbc:postgresql://localhost:5432/sentinel
    driver-class-name: org.postgresql.Driver
    username: sentinel
    password: sentinel
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        hbm2ddl:
          auto: create-drop
  config:
    import: optional:application-secrets.yaml

adsb:
  url: https://opendata.adsb.fi/api/v2/lat/40.0/lon/-75.1/dist/25
  poll-interval-ms: 30000

llm:
  provider: groq
  model: llama-3.3-70b-versatile
  api-key: ${LLM_API_KEY:placeholder}