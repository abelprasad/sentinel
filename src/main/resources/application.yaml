spring:
  application:
    name: sentinel
  datasource:
    url: jdbc:postgresql://localhost:5432/sentinel
    driver-class-name: org.postgresql.Driver
    username: sentinel
    password: sentinel
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
  config:
    import: optional:application-secrets.yaml

adsb:
  url: https://opendata.adsb.fi/api/v2/lat/40.0/lon/-75.1/dist/25
  poll-interval-ms: 30000

llm:
  provider: groq
  model: llama-3.3-70b-versatile
  api-key: ${LLM_API_KEY:placeholder}

logging:
  pattern:
    console: "%d{HH:mm:ss} %clr(%-5level){cyan} %clr(%-30logger{30}){blue} %msg%n"
  level:
    root: WARN
    com.abel.sentinel: INFO
    org.springframework.web: WARN
    org.hibernate: WARN
    org.flywaydb: DEBUG