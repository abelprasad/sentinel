spring:
  application:
    name: sentinel
  datasource:
    url: jdbc:postgresql://localhost:5432/sentinel
    driver-class-name: org.postgresql.Driver
    username: sentinel
    password: sentinel
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        hbm2ddl:
          auto: create-drop
        dialect: org.hibernate.dialect.PostgreSQLDialect

adsb:
  url: https://opendata.adsb.fi/api/v2/lat/40.0/lon/-75.1/dist/25
  poll-interval-ms: 30000